// ═══ LIFECYCLE VIEW ═══
function calcLifecycle(calls){
    const byPhone={};
    calls.forEach(c=>{
        const p=getPhone(c);if(!p||p.length<6)return;
        if(!byPhone[p])byPhone[p]=[];
        byPhone[p].push(c);
    });

    const toMeet=[],toArr=[],toDeal=[],meetToArr=[],arrToDeal=[];

    Object.values(byPhone).forEach(records=>{
        records.sort((a,b)=>(pd(a.called_at)||0)-(pd(b.called_at)||0));
        const firstDate=pd(records[0].called_at);if(!firstDate)return;
        const lastDate=pd(records[records.length-1].called_at)||firstDate;
        const name=records[0].name||'';
        const phone=getPhone(records[0]);
        const hasMeet=records.some(c=>MEET_S.includes(crm(c)));
        const hasArr=records.some(c=>ARR_S.includes(crm(c)));
        const hasDeal=records.some(c=>da(c)>0||crm(c)==='נסגרה עסקה');

        const windowH=(lastDate-firstDate)/(1000*60*60);

        if(hasMeet) toMeet.push({hours:windowH,name,phone,touches:records.length});
        if(hasArr)  toArr.push({hours:windowH,name,phone,touches:records.length});
        if(hasDeal) toDeal.push({hours:windowH,name,phone,touches:records.length});

        // Intermediate: try to find records with distinct statuses
        if(hasMeet&&hasArr){
            const mRec=records.find(c=>MEET_S.includes(crm(c))&&!ARR_S.includes(crm(c)));
            const aRec=records.find(c=>ARR_S.includes(crm(c)));
            if(mRec&&aRec){const md=pd(mRec.called_at),ad=pd(aRec.called_at);if(md&&ad)meetToArr.push({hours:Math.max(0,(ad-md)/(1000*60*60))});}
            else meetToArr.push({hours:0});
        }
        if(hasArr&&hasDeal){
            const aRec=records.find(c=>ARR_S.includes(crm(c))&&crm(c)!=='נסגרה עסקה');
            const dRec=records.find(c=>da(c)>0||crm(c)==='נסגרה עסקה');
            if(aRec&&dRec){const ad=pd(aRec.called_at),dd=pd(dRec.called_at);if(ad&&dd)arrToDeal.push({hours:Math.max(0,(dd-ad)/(1000*60*60))});}
            else arrToDeal.push({hours:0});
        }
    });

    const avg=arr=>arr.length?arr.reduce((s,x)=>s+x.hours,0)/arr.length:0;
    const med=arr=>{if(!arr.length)return 0;const s=[...arr].sort((a,b)=>a.hours-b.hours);const m=Math.floor(s.length/2);return s.length%2?s[m].hours:(s[m-1].hours+s[m].hours)/2;};

    return {toMeet,toArr,toDeal,meetToArr,arrToDeal,
        avgToMeet:avg(toMeet),avgToArr:avg(toArr),avgToDeal:avg(toDeal),
        avgMeetToArr:avg(meetToArr),avgArrToDeal:avg(arrToDeal),
        medToMeet:med(toMeet),medToArr:med(toArr),medToDeal:med(toDeal)};
}

function fmtDays(hours){
    const d=hours/24;
    if(d<0.05)return '< 1';
    return (Math.round(d*10)/10).toString();
}

function renderLifecycleView(calls){
    const lc=calcLifecycle(calls);

    const singleTouch=n=>n.filter(x=>x.touches<=1).length;
    const multiTouch=n=>n.filter(x=>x.touches>1);
    const avgAll=arr=>arr.length?arr.reduce((s,x)=>s+x.hours,0)/arr.length:0;
    const medAll=arr=>{if(!arr.length)return 0;const s=[...arr].sort((a,b)=>a.hours-b.hours);const m=Math.floor(s.length/2);return s.length%2?s[m].hours:(s[m-1].hours+s[m].hours)/2;};
    const avgMT=arr=>{const mt=multiTouch(arr);return mt.length?mt.reduce((s,x)=>s+x.hours,0)/mt.length:0;};
    const medMT=arr=>{const mt=multiTouch(arr).sort((a,b)=>a.hours-b.hours);if(!mt.length)return 0;const m=Math.floor(mt.length/2);return mt.length%2?mt[m].hours:(mt[m-1].hours+mt[m].hours)/2;};

    // Hero KPI - average time to close
    const avgClose=avgAll(lc.toDeal);
    const medClose=medAll(lc.toDeal);
    const stDeals=singleTouch(lc.toDeal);
    const avgCloseMT=avgMT(lc.toDeal);
    const medCloseMT=medMT(lc.toDeal);
    let h=`<div class="section"><div class="chart-card" style="text-align:center;padding:32px;border-top:4px solid var(--accent)">`;
    h+=`<div style="display:flex;justify-content:center;margin-bottom:10px;color:var(--accent)">${IC.money}</div>`;
    h+=`<div style="font-size:15px;font-weight:700;color:var(--text-secondary);margin-bottom:8px">זמן ממוצע לסגירת לקוח</div>`;
    if(lc.toDeal.length>0){
        h+=`<div class="kpi-val" style="font-size:48px;color:var(--accent)">${fmtDays(avgClose)}</div>`;
        h+=`<div style="font-size:16px;color:var(--text-muted);margin-top:4px">ימים</div>`;
        h+=`<div style="font-size:11px;color:var(--text-muted);margin-top:4px">מרגע הפנייה הראשונה ועד האינטראקציה האחרונה</div>`;
        h+=`<div style="display:flex;justify-content:center;gap:24px;margin-top:16px;font-size:13px;flex-wrap:wrap">`;
        h+=`<div><span style="color:var(--text-muted)">חציון:</span> <b>${fmtDays(medClose)} ימים</b></div>`;
        h+=`<div><span style="color:var(--text-muted)">עסקאות:</span> <b>${lc.toDeal.length}</b></div>`;
        if(stDeals>0)h+=`<div><span style="color:var(--text-muted)">אינטראקציה אחת:</span> <b>${stDeals}</b></div>`;
        h+=`</div>`;
        if(multiTouch(lc.toDeal).length>0){
            h+=`<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);font-size:12px;color:var(--text-muted)">`;
            h+=`לידים עם 2+ אינטראקציות: ממוצע <b style="color:var(--accent)">${fmtDays(avgCloseMT)} ימים</b> · חציון <b style="color:var(--accent)">${fmtDays(medCloseMT)} ימים</b> (${multiTouch(lc.toDeal).length} עסקאות)`;
            h+=`</div>`;
        }
    } else {
        h+=`<div style="font-size:16px;color:var(--text-muted);padding:20px 0">אין מספיק נתונים</div>`;
    }
    h+=`</div></div>`;

    h+=`<div class="section"><div class="section-header"><div class="section-title">זמן ממוצע בין שלבים</div><span style="font-size:12px;color:var(--text-muted)">מבוסס על ${countUniquePhones(calls)} לידים ייחודיים</span></div>`;

    h+=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px">`;

    const stages=[
        {label:'ליד → פגישה',arr:lc.toMeet,color:'var(--green)',icon:IC.calendar},
        {label:'ליד → הגיע',arr:lc.toArr,color:'var(--gold)',icon:IC.building},
        {label:'ליד → עסקה',arr:lc.toDeal,color:'var(--purple)',icon:IC.money},
        {label:'פגישה → הגיע',arr:lc.meetToArr,color:'var(--cyan)',icon:IC.check},
        {label:'הגיע → עסקה',arr:lc.arrToDeal,color:'var(--pink)',icon:IC.wallet},
    ];

    stages.forEach(s=>{
        const st=s.arr[0]&&s.arr[0].touches!==undefined?singleTouch(s.arr):s.arr.filter(x=>x.hours<1).length;
        const mt=s.arr[0]&&s.arr[0].touches!==undefined?multiTouch(s.arr):s.arr.filter(x=>x.hours>=1);
        const avgD=avgAll(s.arr);
        const medD=medAll(s.arr);
        h+=`<div class="chart-card" style="text-align:center;border-top:3px solid ${s.color}">`;
        h+=`<div style="margin-bottom:10px;color:${s.color};display:flex;justify-content:center">${s.icon}</div>`;
        h+=`<div style="font-size:13px;font-weight:700;color:var(--text-secondary);margin-bottom:12px">${s.label}</div>`;
        if(s.arr.length>0){
            h+=`<div class="kpi-val" style="font-size:32px;color:${s.color}">${fmtDays(avgD)}</div>`;
            h+=`<div style="font-size:12px;color:var(--text-muted);margin-top:2px">ימים (ממוצע)</div>`;
            if(medD>0)h+=`<div class="kpi-sub" style="margin-top:6px">חציון: ${fmtDays(medD)} ימים</div>`;
            if(st>0)h+=`<div class="kpi-sub">${st} לידים באינטראקציה אחת</div>`;
            h+=`<div class="kpi-sub">מתוך ${s.arr.length} לידים</div>`;
        } else {
            h+=`<div style="font-size:14px;color:var(--text-muted);padding:12px 0">אין נתונים</div>`;
        }
        h+=`</div>`;
    });
    h+=`</div></div>`;

    // Visual flow
    h+=`<div class="section"><div class="section-header"><div class="section-title">תהליך מכירה ממוצע</div></div><div class="chart-card">`;
    h+=`<div style="display:flex;align-items:center;justify-content:center;gap:0;flex-wrap:wrap;padding:20px 0">`;

    const flowAvgMeet=avgAll(lc.toMeet);
    const flowAvgMtA=lc.meetToArr.length?avgAll(lc.meetToArr):0;
    const flowAvgAtD=lc.arrToDeal.length?avgAll(lc.arrToDeal):0;
    const flow=[
        {label:'ליד נכנס',val:countUniquePhones(calls),color:'#3b82f6',icon:IC.leads},
        {label:'פגישה',val:lc.toMeet.length,color:'#10b981',time:flowAvgMeet,icon:IC.calendar},
        {label:'הגיע',val:lc.toArr.length,color:'#eab308',time:flowAvgMtA,icon:IC.building},
        {label:'עסקה',val:lc.toDeal.length,color:'#8b5cf6',time:flowAvgAtD,icon:IC.money},
    ];

    flow.forEach((step,i)=>{
        h+=`<div style="text-align:center;min-width:100px"><div style="width:64px;height:64px;border-radius:50%;background:${step.color}15;border:3px solid ${step.color};margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:${step.color}">${step.val}</div><div style="font-size:12px;font-weight:600">${step.label}</div></div>`;
        if(i<flow.length-1){
            const t=flow[i+1].time;
            h+=`<div style="display:flex;flex-direction:column;align-items:center;padding:0 10px;margin-bottom:20px"><div style="width:60px;height:2px;background:var(--border);position:relative"><div style="position:absolute;left:-4px;top:-3px;border:4px solid transparent;border-right-color:var(--border)"></div></div>`;
            if(t>0)h+=`<div style="font-size:11px;font-weight:600;color:var(--accent);margin-top:4px;white-space:nowrap">${fmtDays(t)} ימים</div>`;
            else h+=`<div style="font-size:11px;color:var(--text-muted);margin-top:4px;white-space:nowrap">באותו יום</div>`;
            h+=`</div>`;
        }
    });
    h+=`</div></div></div>`;

    // Distribution chart
    if(lc.toDeal.length>2){
        h+=`<div class="section"><div class="section-header"><div class="section-title">התפלגות זמן עד סגירת עסקה</div></div><div class="chart-card"><div class="chart-container" style="height:280px"><canvas id="lcDistC"></canvas></div></div></div>`;
    }

    // Fastest & slowest deals
    const mtDeals=multiTouch(lc.toDeal);
    if(mtDeals.length>0){
        const fast=[...mtDeals].sort((a,b)=>a.hours-b.hours).slice(0,5);
        const slow=[...mtDeals].sort((a,b)=>b.hours-a.hours).slice(0,5);

        h+=`<div class="section"><div class="charts-row"><div class="list-card"><div class="chart-head"><span class="chart-title">הכי מהיר לסגירה</span></div>`;
        fast.forEach(l=>{h+=`<div class="list-item"><div class="list-dot" style="background:var(--green)"></div><span class="list-name">${esc(l.name||'ללא שם')}</span><span class="list-count" style="color:var(--green)">${fmtDays(l.hours)} ימים · ${l.touches} אינטראקציות</span></div>`;});
        h+=`</div>`;

        h+=`<div class="list-card"><div class="chart-head"><span class="chart-title">הכי איטי לסגירה</span></div>`;
        slow.forEach(l=>{h+=`<div class="list-item"><div class="list-dot" style="background:var(--red)"></div><span class="list-name">${esc(l.name||'ללא שם')}</span><span class="list-count" style="color:var(--red)">${fmtDays(l.hours)} ימים · ${l.touches} אינטראקציות</span></div>`;});
        h+=`</div></div></div>`;
    }

    _('content').innerHTML=h;

    // Build distribution chart
    if(lc.toDeal.length>2){
        const buckets={'אינטראקציה אחת':0,'1-7 ימים':0,'1-2 שבועות':0,'2-4 שבועות':0,'חודש+':0};
        lc.toDeal.forEach(l=>{
            const d=l.hours/24;
            if(d<1)buckets['אינטראקציה אחת']++;
            else if(d<8)buckets['1-7 ימים']++;
            else if(d<15)buckets['1-2 שבועות']++;
            else if(d<30)buckets['2-4 שבועות']++;
            else buckets['חודש+']++;
        });
        const ctx=document.getElementById('lcDistC');
        if(ctx){
            S.charts.lcDist=new Chart(ctx,{type:'bar',data:{
                labels:Object.keys(buckets),
                datasets:[{data:Object.values(buckets),backgroundColor:['#10b981b3','#3b82f6b3','#f59e0bb3','#f97316b3','#ef4444b3'],borderRadius:4,borderSkipped:false}]
            },options:co(false)});
        }
    }
}

// ═══ INSIGHTS VIEW ═══
function renderInsightsView(calls){
    const pv=S.prevCalls.filter(c=>{if(S.branchFilter&&nb(c)!==S.branchFilter)return false;if(S.channelFilter&&gCh(c).n!==S.channelFilter)return false;return true;});
    const t=calls.length,mt=calls.filter(isMeet),ar=calls.filter(isArr),dl=calls.filter(c=>da(c)>0);
    const rev=calls.reduce((s,c)=>s+da(c),0);
    const days=Math.max(1,Math.round((S.dateTo-S.dateFrom)/(1000*60*60*24))+1);
    const insights=[];

    // Best channel
    const chData={};calls.forEach(c=>{const ch=gCh(c);if(!chData[ch.n])chData[ch.n]={leads:0,meetings:0,rev:0};chData[ch.n].leads++;if(isMeet(c))chData[ch.n].meetings++;chData[ch.n].rev+=da(c);});
    const chSorted=Object.entries(chData).sort((a,b)=>b[1].meetings-a[1].meetings);
    if(chSorted.length)insights.push({icon:'🏆',bg:'var(--gold-bg)',color:'var(--gold)',title:'הערוץ הכי ממיר',text:`<b>${esc(chSorted[0][0])}</b> הביא ${chSorted[0][1].meetings} פגישות מתוך ${chSorted[0][1].leads} לידים (${chSorted[0][1].leads>0?Math.round((chSorted[0][1].meetings/chSorted[0][1].leads)*100):0}% המרה)`,metric:''});

    // Best day
    const dayNames=['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
    const dayCounts=new Array(7).fill(0);calls.forEach(c=>{const d=pd(c.called_at);if(d)dayCounts[d.getDay()]++;});
    const bestDay=dayCounts.indexOf(Math.max(...dayCounts));
    insights.push({icon:'📅',bg:'var(--blue-bg)',color:'var(--blue)',title:'היום הכי חזק',text:`יום <b>${dayNames[bestDay]}</b> הוא היום עם הכי הרבה לידים (${dayCounts[bestDay]} לידים)`,metric:''});

    // Peak hour
    const hrCounts=new Array(24).fill(0);calls.forEach(c=>{const d=pd(c.called_at);if(d)hrCounts[d.getHours()]++;});
    const peakHr=hrCounts.indexOf(Math.max(...hrCounts));
    insights.push({icon:'⏰',bg:'var(--cyan-bg)',color:'var(--cyan)',title:'שעת שיא',text:`רוב הלידים מגיעים בשעה <b>${String(peakHr).padStart(2,'0')}:00</b> (${hrCounts[peakHr]} לידים). כדאי לוודא שיש מענה מלא בשעה הזו.`,metric:''});

    // Out of hours without follow-up
    const ooh=calls.filter(c=>{const d=pd(c.called_at);if(!d)return false;const h=d.getHours(),dw=d.getDay();return dw===6||h<8||h>=18;});
    const oohNoFU=ooh.filter(c=>{const s=crm(c);return !s||s==='אין מענה';});
    if(oohNoFU.length>0)insights.push({icon:'🌙',bg:'var(--orange-bg)',color:'var(--orange)',title:'לידים מחוץ לשעות',text:`${oohNoFU.length} לידים הגיעו מחוץ לשעות פעילות <b>ולא קיבלו מעקב</b>. חזרה מהירה יכולה להציל עסקאות.`,metric:''});

    // Conversion vs target
    const convRate=t>0?Math.round((mt.length/t)*100):0;
    if(convRate<TARGETS.meetRate)insights.push({icon:'📉',bg:'var(--red-bg)',color:'var(--red)',title:'פער מהיעד',text:`אחוז התיאום עומד על <b>${convRate}%</b> — צריך עוד <b>${Math.ceil(t*(TARGETS.meetRate/100))-mt.length}</b> פגישות כדי לעמוד ביעד של ${TARGETS.meetRate}%.`,metric:''});
    else insights.push({icon:'🎯',bg:'var(--green-bg)',color:'var(--green)',title:'עמידה ביעד!',text:`אחוז תיאום של <b>${convRate}%</b> — מעל היעד (${TARGETS.meetRate}%). עבודה מצוינת!`,metric:''});

    // Period comparison
    if(pv.length>0){
        const diff=t-pv.length;const pctDiff=pv.length>0?Math.round(Math.abs(diff)/pv.length*100):0;
        if(diff>0)insights.push({icon:'📈',bg:'var(--green-bg)',color:'var(--green)',title:'מגמה חיובית',text:`עלייה של <b>${pctDiff}%</b> בלידים (${t} מול ${pv.length} בתקופה קודמת). ${diff>10?'שיפור משמעותי!':'ממשיכים בכיוון הנכון.'}`,metric:''});
        else if(diff<0)insights.push({icon:'📉',bg:'var(--red-bg)',color:'var(--red)',title:'ירידה בלידים',text:`ירידה של <b>${pctDiff}%</b> בלידים (${t} מול ${pv.length} בתקופה קודמת). כדאי לבדוק את הקמפיינים.`,metric:''});
    }

    // Revenue insight
    if(rev>0){
        const avgDeal=dl.length>0?Math.round(rev/dl.length):0;
        insights.push({icon:'💰',bg:'var(--purple-bg)',color:'var(--purple)',title:'מחזור הכנסות',text:`סגרת <b>${dl.length} עסקאות</b> בסכום כולל של <b>₪${rev.toLocaleString('he-IL')}</b>. ממוצע לעסקה: ₪${avgDeal.toLocaleString('he-IL')}.`,metric:''});
    }

    // Best branch
    const brData={};calls.forEach(c=>{const b=nb(c);if(!brData[b])brData[b]={leads:0,meetings:0};brData[b].leads++;if(isMeet(c))brData[b].meetings++;});
    const brSorted=Object.entries(brData).sort((a,b)=>{const ra=a[1].leads>0?a[1].meetings/a[1].leads:0;const rb=b[1].leads>0?b[1].meetings/b[1].leads:0;return rb-ra;});
    if(brSorted.length>1){const best=brSorted[0];const rate=best[1].leads>0?Math.round((best[1].meetings/best[1].leads)*100):0;
    insights.push({icon:'🏢',bg:'var(--accent-bg)',color:'var(--accent)',title:'הסניף המוביל',text:`<b>${esc(best[0])}</b> מוביל באחוזי המרה עם ${rate}% תיאום (${best[1].meetings} פגישות מ-${best[1].leads} לידים).`,metric:''});}

    // Forms vs calls
    const forms=calls.filter(isF),phCalls=calls.filter(isC);
    const fMeet=forms.filter(isMeet).length,cMeet=phCalls.filter(isMeet).length;
    const fRate=forms.length>0?Math.round((fMeet/forms.length)*100):0,cRate=phCalls.length>0?Math.round((cMeet/phCalls.length)*100):0;
    if(forms.length>0&&phCalls.length>0){
        const better=fRate>cRate?'טפסים':'שיחות טלפון';const bRate=Math.max(fRate,cRate);
        insights.push({icon:'📊',bg:'var(--pink-bg)',color:'var(--pink)',title:'מה ממיר יותר?',text:`<b>${better}</b> ממירים טוב יותר עם ${bRate}% המרה (טפסים ${fRate}% | שיחות ${cRate}%).`,metric:''});
    }

    let h=`<div class="section"><div class="section-header"><div class="section-title">תובנות חכמות</div><span style="font-size:12px;color:var(--text-muted)">${insights.length} תובנות זוהו</span></div>`;
    h+=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:12px">`;
    insights.forEach(ins=>{
        h+=`<div class="insight-card"><div class="insight-icon" style="background:${ins.bg};color:${ins.color};font-size:20px">${ins.icon}</div><div><div class="insight-title">${ins.title}</div><div class="insight-text">${ins.text}</div></div></div>`;
    });
    h+=`</div></div>`;

    h+=`<div class="section"><div class="section-header"><div class="section-title">סיכום מנהלים</div></div><div class="chart-card" style="padding:24px;line-height:2;font-size:14px">`;
    h+=`<p>בתקופה הנבחרת הגיעו <b>${t} לידים</b> (ממוצע ${Math.round(t/days*10)/10} ליום). `;
    h+=`מתוכם, <b>${mt.length} תואמו לפגישה</b> (${convRate}%)`;
    if(ar.length)h+=`, <b>${ar.length} הגיעו</b>`;
    if(dl.length)h+=` ונסגרו <b>${dl.length} עסקאות</b> בסך ₪${rev.toLocaleString('he-IL')}`;
    h+=`.</p>`;
    if(chSorted.length>1)h+=`<p>הערוץ המוביל הוא <b>${esc(chSorted[0][0])}</b>, ורוב הפעילות מתרחשת ביום <b>${dayNames[bestDay]}</b> סביב השעה <b>${String(peakHr).padStart(2,'0')}:00</b>.</p>`;
    h+=`</div></div>`;

    _('content').innerHTML=h;
}

// ═══ LEAD TIMELINE ═══
function showLeadTimeline(phone,name){
    const existing=document.getElementById('tlDrawer');if(existing)existing.remove();
    const existingBg=document.getElementById('tlBackdrop');if(existingBg)existingBg.remove();

    const allByPhone=S.allCalls.filter(c=>{
        const p=c.caller_number_bare||c.caller_number_format||'';
        return p===phone;
    }).sort((a,b)=>(pd(a.called_at)||0)-(pd(b.called_at)||0));

    if(!allByPhone.length){toast('לא נמצאו אירועים עבור ליד זה','info');return;}

    let html=`<button class="timeline-close" onclick="closeTimeline()">✕</button>`;
    html+=`<div class="timeline-header"><div class="timeline-name">${esc(name||'ללא שם')}</div><div class="timeline-phone">${esc(phone)}</div>`;
    html+=`<div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap">`;
    html+=`<span class="badge badge-blue">${allByPhone.length} אירועים</span>`;
    const hasM=allByPhone.some(isMeet);if(hasM)html+=`<span class="badge badge-green">יש פגישה</span>`;
    const hasDeal=allByPhone.some(c=>da(c)>0);if(hasDeal)html+=`<span class="badge badge-purple">יש עסקה</span>`;
    html+=`</div></div>`;

    html+=`<div style="margin-top:8px">`;
    allByPhone.forEach(c=>{
        const d=pd(c.called_at);
        const ds=d?d.toLocaleString('he-IL',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'}):'—';
        const fm=isF(c);const ch=gCh(c);const cs=crm(c);const cm=CRMM[cs]||null;
        const answered=isA(c);const missed=isM(c);
        let dotColor='var(--blue)';
        if(cs&&CRMM[cs])dotColor=CRMM[cs].c;
        else if(missed)dotColor='var(--red)';
        else if(answered)dotColor='var(--green)';
        else if(fm)dotColor='var(--pink)';

        html+=`<div class="tl-item"><div class="tl-dot" style="background:${dotColor}"></div>`;
        html+=`<div class="tl-time">${ds}</div>`;
        html+=`<div class="tl-desc">${fm?'<span class="badge badge-pink" style="margin-left:6px">טופס</span>':missed?'<span class="badge badge-red" style="margin-left:6px">לא נענתה</span>':answered?'<span class="badge badge-green" style="margin-left:6px">שיחה נענתה</span>':'<span class="badge badge-blue" style="margin-left:6px">שיחה</span>'} ${esc(ch.n)}</div>`;
        const meta=[];
        if(cs)meta.push(`סטטוס: <span class="badge ${cm?cm.b:'badge-gray'}">${esc(cs)}</span>`);
        if(c.talk_time)meta.push(`משך: ${c.talk_time}s`);
        if(da(c)>0)meta.push(`עסקה: ₪${da(c).toLocaleString('he-IL')}`);
        if(nb(c))meta.push(esc(nb(c)));
        if(meta.length)html+=`<div class="tl-meta">${meta.join(' · ')}</div>`;
        html+=`</div>`;
    });
    html+=`</div>`;

    const bg=document.createElement('div');bg.className='timeline-backdrop';bg.id='tlBackdrop';bg.onclick=closeTimeline;
    const drawer=document.createElement('div');drawer.className='timeline-drawer';drawer.id='tlDrawer';drawer.innerHTML=html;
    document.body.appendChild(bg);document.body.appendChild(drawer);
}
function closeTimeline(){
    const d=document.getElementById('tlDrawer'),b=document.getElementById('tlBackdrop');
    if(d)d.remove();if(b)b.remove();
}

// ═══ DATE ═══
function setDP(p){
    const now=new Date();let f,t;
    switch(p){case 'today':f=t=new Date();break;case 'yesterday':f=t=new Date();f.setDate(f.getDate()-1);break;case '7days':t=new Date();f=new Date();f.setDate(f.getDate()-7);break;case '30days':t=new Date();f=new Date();f.setDate(f.getDate()-30);break;case 'thisMonth':f=new Date(now.getFullYear(),now.getMonth(),1);t=new Date();break;case 'lastMonth':f=new Date(now.getFullYear(),now.getMonth()-1,1);t=new Date(now.getFullYear(),now.getMonth(),0);break;case 'thisYear':f=new Date(now.getFullYear(),0,1);t=new Date();break;}
    S.dateFrom=f;S.dateTo=t;_('dateFrom').value=fd(f);_('dateTo').value=fd(t);
    document.querySelectorAll('.date-presets button').forEach(b=>b.classList.remove('active'));
    document.querySelector(`[data-dp="${p}"]`)?.classList.add('active');
    refreshData();
}
_('dateFrom')?.addEventListener('change',function(){
    S.dateFrom=new Date(this.value);
    document.querySelectorAll('.date-presets button').forEach(b=>b.classList.remove('active'));
    if(S.dateFrom&&S.dateTo&&S.dateFrom<=S.dateTo)refreshData();
});
_('dateTo')?.addEventListener('change',function(){
    S.dateTo=new Date(this.value);
    document.querySelectorAll('.date-presets button').forEach(b=>b.classList.remove('active'));
    if(S.dateFrom&&S.dateTo&&S.dateFrom<=S.dateTo)refreshData();
});

// ═══ UTIL ═══
function _(id){return document.getElementById(id);}
function fd(d){if(!d)return '';const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');return `${y}-${m}-${day}`;}
function pct(a,b){return b>0?Math.round((a/b)*100)+'%':'0%';}
function animV(el,end){const t0=performance.now();(function s(n){const p=Math.min((n-t0)/500,1);el.textContent=Math.round((1-Math.pow(1-p,3))*end).toLocaleString('he-IL');if(p<1)requestAnimationFrame(s);})(t0);}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function sl(ms){return new Promise(r=>setTimeout(r,ms));}
function co(legend,xSz){
    const dk=isDark();const tc=dk?'#6b7280':'#9ca3af';const lc=dk?'#9ca3af':'#6b7280';const gc=dk?'#2a2d3e':'#f0f0f5';
    return{responsive:true,maintainAspectRatio:false,plugins:{legend:legend?{position:'top',rtl:true,align:'start',labels:{color:lc,font:{family:'Ping',size:11},padding:14,boxWidth:14,boxHeight:4,useBorderRadius:true,borderRadius:2}}:{display:false},tooltip:tt()},scales:{x:{grid:{display:false},ticks:{color:tc,font:{family:'Ping',size:xSz||11},maxRotation:0}},y:{beginAtZero:true,grid:{color:gc},ticks:{color:tc,font:{family:'Ping'}}}}};
}
function tt(){
    const dk=isDark();
    return{rtl:true,textDirection:'rtl',backgroundColor:dk?'#1a1d2e':'#fff',titleColor:dk?'#e5e7ee':'#1a1d2e',bodyColor:dk?'#9ca3af':'#6b7280',borderColor:dk?'#2a2d3e':'#e5e7ee',borderWidth:1,titleFont:{family:'Ping',weight:600},bodyFont:{family:'Ping'},padding:10,boxPadding:4};
}
function drillDown(filter){
    S.tableFilter=filter;S.tablePage=1;
    setView('leads');
    setTimeout(()=>{
        loadLeadsTable();
        document.querySelectorAll('.fbtn').forEach(b=>b.classList.toggle('active',b.dataset.f===filter));
    },50);
}

let leadsSortCol=0,leadsSortDir='desc';
function sortLeadsTable(col,type,thEl){
    const table=document.getElementById('leadsTable');if(!table)return;
    const allTh=table.querySelectorAll('thead th.sortable');
    if(col===leadsSortCol){leadsSortDir=leadsSortDir==='desc'?'asc':'desc';}
    else{leadsSortCol=col;leadsSortDir='desc';}
    allTh.forEach(th=>{th.classList.remove('active');th.dataset.dir='';const ar=th.querySelector('.sort-arrow');if(ar)ar.textContent='↕';});
    thEl.classList.add('active');thEl.dataset.dir=leadsSortDir;
    const ar=thEl.querySelector('.sort-arrow');if(ar)ar.textContent=leadsSortDir==='desc'?'↓':'↑';
    sortTable('leadsTable',col,type,thEl);
}

function sortTable(tableId,colIdx,type,thEl){
    const table=document.getElementById(tableId);if(!table)return;
    const tbody=table.querySelector('tbody');if(!tbody)return;
    const rows=Array.from(tbody.querySelectorAll('tr'));
    const allTh=table.querySelectorAll('thead th.sortable');
    let dir='desc';
    if(thEl.classList.contains('active')){
        dir=thEl.dataset.dir==='desc'?'asc':'desc';
    }
    allTh.forEach(th=>{th.classList.remove('active');th.dataset.dir='';const ar=th.querySelector('.sort-arrow');if(ar)ar.textContent='↕';});
    thEl.classList.add('active');
    thEl.dataset.dir=dir;
    const ar=thEl.querySelector('.sort-arrow');if(ar)ar.textContent=dir==='desc'?'↓':'↑';

    rows.sort((a,b)=>{
        let va=a.cells[colIdx]?.textContent?.trim()||'';
        let vb=b.cells[colIdx]?.textContent?.trim()||'';
        if(type==='num'){
            va=parseFloat(va.replace(/[^\d.-]/g,''))||0;
            vb=parseFloat(vb.replace(/[^\d.-]/g,''))||0;
            return dir==='desc'?vb-va:va-vb;
        }
        return dir==='desc'?vb.localeCompare(va,'he'):va.localeCompare(vb,'he');
    });
    rows.forEach((r,i)=>{r.cells[0].textContent=i+1;tbody.appendChild(r);});
}

function toggleAudio(btn,url){
    const existing=btn.parentElement.querySelector('.audio-player');
    if(existing){existing.remove();btn.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg> השמע';return;}
    document.querySelectorAll('.audio-player').forEach(p=>p.remove());
    const div=document.createElement('div');div.className='audio-player';
    div.innerHTML=`<audio controls autoplay preload="none"><source src="${url}" type="audio/mpeg">דפדפן לא תומך</audio>`;
    btn.parentElement.appendChild(div);
    btn.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> עצור';
}

// ═══ RESPONSE TIME ═══
function calcResponseTime(calls){
    const withCrm=calls.filter(c=>{const s=crm(c);return s&&s!=='אין מענה'&&!isF(c);});
    if(!withCrm.length)return null;
    const times=withCrm.map(c=>{
        const called=pd(c.called_at);if(!called)return null;
        const tt=c.talk_time||0;
        return tt;
    }).filter(t=>t!==null&&t>0);
    if(!times.length)return null;
    const avg=Math.round(times.reduce((s,t)=>s+t,0)/times.length);
    const under30=times.filter(t=>t<30).length;
    const under60=times.filter(t=>t<60).length;
    return {avg,under30,under60,total:times.length,under30pct:Math.round((under30/times.length)*100),under60pct:Math.round((under60/times.length)*100)};
}

// ═══ REPEAT CALLERS ═══
function calcRepeatCallers(calls){
    const byPhone={};
    calls.forEach(c=>{
        const ph=c.caller_number_bare||c.caller_number_format||'';
        if(!ph||ph.length<6)return;
        if(!byPhone[ph])byPhone[ph]={count:0,name:c.name||'',hasMeet:false};
        byPhone[ph].count++;
        if(isMeet(c))byPhone[ph].hasMeet=true;
    });
    const repeats=Object.entries(byPhone).filter(([_,d])=>d.count>1).sort((a,b)=>b[1].count-a[1].count);
    const totalRepeats=repeats.length;
    const totalRepeatCalls=repeats.reduce((s,x)=>s+x[1].count,0);
    const repeatsWithMeet=repeats.filter(([_,d])=>d.hasMeet).length;
    return {repeats:repeats.slice(0,10),totalRepeats,totalRepeatCalls,repeatsWithMeet};
}

// ═══ EXPORT EXCEL ═══
function exportExcel(){
    const calls=fc();
    if(!calls.length){toast('אין נתונים לייצוא','error');return;}
    const BOM='\uFEFF';
    const headers=['תאריך','סוג','שם','טלפון','ערוץ','סניף','סטטוס CRM','סכום עסקה','שולם','קמפיין'];
    const rows=calls.map(c=>{
        const date=pd(c.called_at);
        const ds=date?date.toLocaleString('he-IL',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}):'';
        return [ds,isF(c)?'טופס':'שיחה',c.name||'',c.caller_number_format||c.caller_number_bare||'',gCh(c).n,nb(c),crm(c),da(c)||'',dp(c)||'',getCN(c)];
    });
    let csv=BOM+headers.join(',')+'\n';
    rows.forEach(r=>{csv+=r.map(v=>'"'+(v+'').replace(/"/g,'""')+'"').join(',')+'\n';});

    const summaryHeaders=['מדד','ערך'];
    const t=calls.length,mt=calls.filter(isMeet).length,ar=calls.filter(isArr).length,dl=calls.filter(c=>da(c)>0).length;
    const tr=calls.reduce((s,c)=>s+da(c),0);
    const summaryRows=[
        ['סה"כ לידים',t],['שיחות',calls.filter(isC).length],['טפסים',calls.filter(isF).length],
        ['פגישות שתואמו',mt],['הגיעו לפגישה',ar],['עסקאות',dl],
        ['אחוז תיאום',t>0?Math.round((mt/t)*100)+'%':'0%'],
        ['אחוז הגעה',mt>0?Math.round((ar/mt)*100)+'%':'0%'],
        ['מחזור הכנסות','₪'+tr.toLocaleString('he-IL')],
    ];
    csv+='\n\n'+summaryHeaders.join(',')+'\n';
    summaryRows.forEach(r=>{csv+=r.map(v=>'"'+(v+'').replace(/"/g,'""')+'"').join(',')+'\n';});

    const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
    const link=document.createElement('a');
    const from=_('dateFrom')?.value||'', to=_('dateTo')?.value||'';
    link.href=URL.createObjectURL(blob);
    link.download=`true-beauty-report_${from}_${to}.csv`;
    link.click();
    URL.revokeObjectURL(link.href);
    toast(`יוצאו ${calls.length} לידים לקובץ Excel`,'success');
}

function toast(msg,type='info'){const c=_('tc'),t=document.createElement('div');t.className=`toast ${type}`;t.textContent=msg;c.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transform='translateY(16px)';t.style.transition='all 0.3s';setTimeout(()=>t.remove(),300);},3500);}
</script>
