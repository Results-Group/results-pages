<head>

    <style>
        @font-face {
            font-family: 'Ping';
            src: url('https://my-fonts-bucket-results.s3.eu-north-1.amazonaws.com/pingnew/ping-regular.woff2') format('woff2');
            font-weight: 400;
        }
        @font-face {
            font-family: 'Ping';
            src: url('https://my-fonts-bucket-results.s3.eu-north-1.amazonaws.com/pingnew/ping-bold.woff2') format('woff2');
            font-weight: 700;
        }
        @font-face {
            font-family: 'Leon';
            src: url('https://my-fonts-bucket-results.s3.eu-north-1.amazonaws.com/Leon/Leon-Regular.woff2') format('woff2');
            font-weight: 400;
        }
        @font-face {
            font-family: 'Leon';
            src: url('https://my-fonts-bucket-results.s3.eu-north-1.amazonaws.com/Leon/Leon-Bold.woff2') format('woff2');
            font-weight: 700;
        }
        @font-face {
            font-family: 'FBJabutinski';
            src: url('https://my-fonts-bucket-results.s3.eu-north-1.amazonaws.com/FBJABUTINSKI/FBJABUTINSKI-CONBLACK.woff2') format('woff2');
            font-weight: 900;
        }

        :root {
            --accent-blue: #38b9ff;
            --accent-blue-form: #0241C2;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Leon', sans-serif;
            background: #000000;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Background effects */
        .bg-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(56, 185, 255, 0.08) 0%, transparent 70%);
            filter: blur(80px);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            animation: glowPulse 6s ease-in-out infinite alternate;
        }

        @keyframes glowPulse {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
            100% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }

        /* Main card */
        .thanks-container {
            position: relative;
            z-index: 2;
            text-align: center;
            max-width: 650px;
            width: 90%;
            padding: 60px 40px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5);
        }

        .thanks-container::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.02) 50%, rgba(56, 185, 255, 0.1) 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        /* Checkmark */
        .check-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-blue-form));
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            box-shadow: 0 10px 40px rgba(56, 185, 255, 0.3);
            animation: scaleIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transform: scale(0);
        }

        @keyframes scaleIn {
            to { transform: scale(1); }
        }

        .check-circle svg {
            width: 36px;
            height: 36px;
            stroke: #fff;
            stroke-width: 3;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 50;
            stroke-dashoffset: 50;
            animation: drawCheck 0.5s 0.4s ease forwards;
        }

        @keyframes drawCheck {
            to { stroke-dashoffset: 0; }
        }

        /* Text */
        .thanks-title {
            font-family: 'FBJabutinski', sans-serif;
            font-weight: 900;
            font-size: clamp(32px, 5vw, 48px);
            line-height: 1.1;
            letter-spacing: 1px;
            margin-bottom: 20px;
            background: linear-gradient(180deg, #ffffff 50%, rgba(255,255,255,0.6) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fadeUp 0.7s 0.2s ease both;
        }

        .thanks-subtitle {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.55);
            line-height: 1.6;
            max-width: 450px;
            margin: 0 auto 35px;
            animation: fadeUp 0.7s 0.4s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Info badges */
        .info-badges {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 40px;
            animation: fadeUp 0.7s 0.6s ease both;
        }

        .info-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 15px;
            color: rgba(255, 255, 255, 0.7);
        }

        .info-dot {
            width: 7px;
            height: 7px;
            background: var(--accent-blue);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-blue);
            flex-shrink: 0;
        }

        /* CTA */
        .thanks-cta {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 40px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            color: #ffffff;
            font-family: 'Leon', sans-serif;
            font-size: 16px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            backdrop-filter: blur(10px);
            animation: fadeUp 0.7s 0.8s ease both;
        }

        .thanks-cta:hover {
            background: rgba(56, 185, 255, 0.1);
            border-color: var(--accent-blue);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(56, 185, 255, 0.15);
        }

        .thanks-cta svg {
            width: 18px;
            height: 18px;
            stroke: var(--accent-blue);
            stroke-width: 2.5;
            fill: none;
        }

        /* Branding */
        .thanks-brand {
            margin-top: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            animation: fadeUp 0.7s 1s ease both;
        }

        .thanks-brand img {
            height: 22px;
            filter: brightness(0) invert(1);
            opacity: 0.4;
        }

        .brand-divider {
            width: 1px;
            height: 16px;
            background: rgba(255, 255, 255, 0.15);
        }

        .brand-text {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
            font-weight: 700;
            letter-spacing: 1px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .thanks-container {
                padding: 45px 25px;
                border-radius: 28px;
            }
            .check-circle {
                width: 65px;
                height: 65px;
                margin-bottom: 22px;
            }
            .check-circle svg {
                width: 28px;
                height: 28px;
            }
            .thanks-subtitle {
                font-size: 15px;
                margin-bottom: 28px;
            }
            .info-badge {
                font-size: 13px;
            }
            .thanks-cta {
                padding: 14px 30px;
                font-size: 14px;
            }
            .thanks-brand {
                flex-wrap: wrap;
                gap: 8px;
            }
            .thanks-brand img {
                height: 18px;
            }
            .brand-text {
                font-size: 11px;
                width: 100%;
                margin-top: 4px;
            }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>
    <div class="bg-grid"></div>

    <div class="thanks-container">
        <div class="check-circle">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </div>

        <h1 class="thanks-title">תודה שפניתם אלינו!</h1>

        <p class="thanks-subtitle">פרטיכם התקבלו בהצלחה. מומחה המכשור של ESE יחזור אליכם בהקדם עם התאמה אישית של המכשיר המדויק עבורכם.</p>

        <div class="info-badges">
            <div class="info-badge">
                <div class="info-dot"></div>
                <span>נחזור אליכם תוך יום עסקים אחד</span>
            </div>
            <div class="info-badge">
                <div class="info-dot"></div>
                <span>ייעוץ מקצועי ללא התחייבות</span>
            </div>
            <div class="info-badge">
                <div class="info-dot"></div>
                <span>ESE — היבואן הרשמי של Panasonic בישראל</span>
            </div>
        </div>

        <a href="https://waze.com/ul/hsv8wp0q1v" target="_blank" class="thanks-cta">
            <svg viewBox="0 0 24 24"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
            <span>נווטו למרכז החוויה שלנו</span>
        </a>

        <div class="thanks-brand">
            <img src="https://static.wixstatic.com/media/bb1f28_6a0261791b8b4cc28fe5354065abc974~mv2.png" alt="Panasonic">
            <div class="brand-divider"></div>
            <img src="https://static.wixstatic.com/media/bb1f28_d194ac8b2fce46f1bba29c7f74c8064c~mv2.png" alt="Sassonic">
            <div class="brand-divider"></div>
            <span class="brand-text">היבואן הרשמי</span>
        </div>
    </div>

</body>
</html>
